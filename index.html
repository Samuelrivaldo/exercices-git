<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestionnaire de tâches avancé - Projet éducatif pour pratiquer Git">
    <title>Task Master</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>Task Master</h1>
                <p class="subtitle">Architecture modulaire MVVM avancée</p>
            </div>
        </header>

        <div class="app-layout">
            <aside class="sidebar">
                <div class="nav-tabs">
                    <button class="nav-tab active" data-tab="filters">Filtres</button>
                    <button class="nav-tab" data-tab="analytics">Analytics</button>
                </div>
                <div id="filterPanel" class="sidebar-content active"></div>
                <div id="analyticsPanel" class="sidebar-content"></div>
            </aside>

            <main class="main-content">
                <section class="input-section">
                    <div class="input-group">
                        <input type="text" id="taskInput" class="task-input" placeholder="Ajouter une nouvelle tâche...">
                        <button id="addBtn" class="btn btn-primary">Ajouter</button>
                    </div>
                </section>

                <section class="task-section">
                    <div class="task-header-bar">
                        <h2>Mes Tâches</h2>
                        <div class="task-actions-bar">
                            <button id="exportBtn" class="btn btn-secondary">Exporter</button>
                            <button id="importBtn" class="btn btn-secondary">Importer</button>
                            <button id="clearBtn" class="btn btn-danger">Effacer</button>
                        </div>
                    </div>
                    <ul id="taskList" class="task-list"></ul>
                </section>
            </main>
        </div>
    </div>

    <!-- Models -->
    <script src="js/models/Task.js"></script>
    <script src="js/models/Category.js"></script>
    <script src="js/models/Analytics.js"></script>

    <!-- Services -->
    <script src="js/services/StorageService.js"></script>
    <script src="js/services/TaskService.js"></script>
    <script src="js/services/FilterService.js"></script>

    <!-- Utils -->
    <script src="js/utils/events.js"></script>
    <script src="js/utils/validators.js"></script>
    <script src="js/utils/helpers.js"></script>

    <!-- Controller -->
    <script src="js/controllers/AppController.js"></script>

    <!-- Views -->
    <script src="js/views/TaskListView.js"></script>
    <script src="js/views/AnalyticsView.js"></script>
    <script src="js/views/FilterView.js"></script>

    <!-- Main -->
    <script src="js/main.js"></script>
</body>
</html>
